name: Bug report
description: Report incorrect tab closing or extension behavior.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Include expected behavior and whether a tab was closed unexpectedly.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Atlas 1.2026.126.0
    validations:
      required: true
  - type: textarea
    id: settings
    attributes:
      label: Relevant TinyTab settings
      description: Do not include private URLs or page content.
    validations:
      required: true
